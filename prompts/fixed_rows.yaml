    value: 0
    labels:
      english: "."
      urdu: "."

  - list_name: yn
    value: 1
    labels:
      english: "Yes"
      urdu: "ہاں"

  - list_name: yn
    value: 2
    labels:
      english: "No"
      urdu: "نہیں"

  - list_name: yn1
    value: 1
    labels:
      english: "Yes"
      urdu: "ہاں"

  - list_name: yn1
    value: 2
    labels:
      english: "No"
      urdu: "نہیں"

  - list_name: yn1
    value: 98
    labels:
      english: "Don't Know"
      urdu: "معلوم نہیں (پڑھ کر نہ سُنائیں)"
